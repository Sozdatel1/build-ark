name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev python3-dev python3-setuptools build-essential libtinfo6
          pip3 install --user --upgrade buildozer cython


      - name: Build with Buildozer
        run: |
          # 1. Добавляем путь к локальным бинарникам (где лежит сам buildozer)
          export PATH=$PATH:$HOME/.local/bin
          
          # 2. Запускаем "холостой" прогон, чтобы buildozer сам скачал SDK
          # Мы прервем его, если он зависнет, но он успеет создать папки
          yes | buildozer android p4a -- help || true
          
          # 3. Теперь, когда SDK скачан, принудительно ставим build-tools
          export SDK_PATH=$HOME/.buildozer/android/platform/android-sdk
          if [ -d "$SDK_PATH" ]; then
            yes | $SDK_PATH/tools/bin/sdkmanager --sdk_root=$SDK_PATH "build-tools;34.0.0"
          fi
          
          # 4. Основная сборка
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: bin/*.apk
