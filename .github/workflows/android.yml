name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool libtool-bin pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev python3-dev python3-setuptools build-essential libtinfo6 gettext m4
          # Это «хакерский» фикс для Ubuntu 24.04: принудительно обновляем макросы
          sudo apt install --reinstall libtool
          pip3 install --user --upgrade buildozer cython



      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # 1. Сначала заставляем buildozer просто подготовить почву (без компиляции)
          # Это создаст все нужные папки
          buildozer android p4a -- help || true
          
          # 2. Прямо указываем путь к свежесозданному SDK
          export SDK_PATH=$HOME/.buildozer/android/platform/android-sdk
          
          # 3. Если папки нет — создадим её принудительно (фикс для "No such file")
          mkdir -p $SDK_PATH
          
          # 4. Устанавливаем компоненты, без которых вылетает Aidl Error
          # Мы скачиваем сам sdkmanager, если его еще нет
          buildozer android sdk_update || true
          
          # 5. Принудительно ставим нужные build-tools
          if [ -f "$SDK_PATH/tools/bin/sdkmanager" ]; then
            yes | $SDK_PATH/tools/bin/sdkmanager --sdk_root=$SDK_PATH "build-tools;34.0.0" "platforms;android-34"
          fi
          
          # 6. ФИНАЛЬНЫЙ ШТУРМ
          # Используем флаг --warn_on_root на всякий случай
          buildozer -v android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: bin/*.apk
