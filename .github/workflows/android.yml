name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev python3-dev python3-setuptools build-essential libtinfo6
          pip3 install --user --upgrade buildozer cython


      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 1. Указываем путь к SDK (он там создается по умолчанию)
          export ANDROID_SDK_HOME=$HOME/.buildozer/android/platform/android-sdk
          
          # 2. Принудительно устанавливаем build-tools, где лежит aidl
          # Мы используем версию 34.0.0 (актуальная для r25b)
          yes | $ANDROID_SDK_HOME/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_HOME "build-tools;34.0.0" "platforms;android-34"
          
          # 3. Запускаем сборку
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: bin/*.apk
